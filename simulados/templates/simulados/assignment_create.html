{% extends "base.html" %}
{% block content %}
<h1>Atribuir simulado</h1>
<form method="post">
  {% csrf_token %}
  <label>Área:
    <select name="discipline">
      {% for value, label in disciplines %}
      <option value="{{ value }}">{{ label }}</option>
      {% endfor %}
    </select>
  </label>
  <br>
  <label>Assunto (opcional):
    <select name="topic_id">
      <option value="">Qualquer assunto da área</option>
      {% for topic in topics %}
      <option value="{{ topic.id }}">{{ topic.name }} ({{ topic.get_discipline_display }})</option>
      {% endfor %}
    </select>
  </label>
  <br>
  <label>Quantidade de questões:
    <input type="number" name="quantidade" value="10" min="1" max="90">
  </label>
  <br>
  <label>Turma (opcional):
    <select name="turma_id">
      <option value="">Nenhuma</option>
      {% for turma in turmas %}
      <option value="{{ turma.id }}">{{ turma.nome }}</option>
      {% endfor %}
    </select>
  </label>
  <br>
  <label>Alunos específicos (opcional, além da turma):</label>
  <select name="alunos" multiple size="6">
    {% for aluno in alunos %}
    <option value="{{ aluno.id }}">{{ aluno.user.nome }} ({{ aluno.user.email }})</option>
    {% endfor %}
  </select>
  <br>
  <button type="submit">Atribuir</button>
</form>
{% endblock %}
