steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'southamerica-east1-docker.pkg.dev/prepara-enem-501721/cloud-run-source-deploy/pedrovneves-prepara-enem/prepara-enem:$COMMIT_SHA'
      - '-t'
      - 'southamerica-east1-docker.pkg.dev/prepara-enem-501721/cloud-run-source-deploy/pedrovneves-prepara-enem/prepara-enem:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'southamerica-east1-docker.pkg.dev/prepara-enem-501721/cloud-run-source-deploy/pedrovneves-prepara-enem/prepara-enem'

  # deploy automático — é o passo que faltava: até aqui, o build só empurrava
  # a imagem pro Artifact Registry, sem nunca criar uma revisão nova no Cloud
  # Run (por isso a implantação manual sempre foi necessária depois de todo push).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'prepara-enem'
      - '--image=southamerica-east1-docker.pkg.dev/prepara-enem-501721/cloud-run-source-deploy/pedrovneves-prepara-enem/prepara-enem:$COMMIT_SHA'
      - '--region=southamerica-east1'
      - '--platform=managed'

images:
  - 'southamerica-east1-docker.pkg.dev/prepara-enem-501721/cloud-run-source-deploy/pedrovneves-prepara-enem/prepara-enem:$COMMIT_SHA'
  - 'southamerica-east1-docker.pkg.dev/prepara-enem-501721/cloud-run-source-deploy/pedrovneves-prepara-enem/prepara-enem:latest'

options:
  logging: CLOUD_LOGGING_ONLY
