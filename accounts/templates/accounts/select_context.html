{% extends "base.html" %}
{% block content %}
<h1>Entrar como...</h1>
<form method="post">
  {% csrf_token %}
  <ul>
    {% for index, context in contexts %}
    <li>
      <label>
        <input type="radio" name="context_index" value="{{ index }}" {% if forloop.first %}checked{% endif %}>
        {{ context.label }}
      </label>
    </li>
    {% endfor %}
  </ul>
  <button type="submit">Continuar</button>
</form>
{% endblock %}
