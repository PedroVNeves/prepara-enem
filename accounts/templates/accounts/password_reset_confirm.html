{% extends "base.html" %}
{% block content %}
<h1>Definir nova senha</h1>
{% if validlink %}
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Salvar nova senha</button>
</form>
{% else %}
<p>O link de redefinição é inválido ou já expirou.</p>
{% endif %}
{% endblock %}
